name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build
        run: npm run build -- --base=/marketing-content/
        env:
          # Publishable (public) Supabase config — safe to expose; RLS + the
          # owner approval gate protect the data.
          VITE_SUPABASE_URL: https://cribsxrkpxdzfdjjqyru.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNyaWJzeHJrcHhkemZkampxeXJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MjEzNTYsImV4cCI6MjA5ODI5NzM1Nn0.kqvx14-aiENKXReEL55SeLNPSGx4jao6dTQG363FZAQ
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
